# ─── General ───

# True color support (use tmux-256color inside tmux)
set -g default-terminal "tmux-256color"

# True color overrides for Ghostty and other modern terminals
set -ag terminal-overrides ",xterm-ghostty:Tc:RGB"
set -ag terminal-overrides ",xterm-256color:Tc:RGB"

# Undercurl support (used by Neovim diagnostics)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Extended keys for modifier key support
set -g extended-keys on
set -as terminal-features ',xterm-ghostty:extkeys'

# No delay after pressing Escape (critical for vim)
set -sg escape-time 0

# Scrollback buffer
set -g history-limit 50000

# Display messages for 4 seconds
set -g display-time 4000

# Refresh status bar every 5 seconds
set -g status-interval 5

# Focus events (needed for vim autoread)
set -g focus-events on

# Aggressive resize (useful for multi-monitor)
setw -g aggressive-resize on

# Start windows and panes at 0
set -g base-index 0
setw -g pane-base-index 0

# Renumber windows when one is closed
set -g renumber-windows on

# Enable mouse (scrolling, selecting panes, resizing)
set -g mouse on

# Vi key bindings in copy mode
setw -g mode-keys vi

# Emacs key bindings in command prompt
set -g status-keys emacs

# Allow tmux to set terminal title
set -g set-titles on
set -g set-titles-string "#T"

# Clipboard integration via OSC 52 (critical for Ghostty)
set -g set-clipboard on
set -g allow-passthrough on

# Longer repeat time for repeatable bindings
set -g repeat-time 600

# Activity monitoring (highlight in status bar only)
setw -g monitor-activity on
set -g visual-activity off

# ─── Prefix key ───

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Keybindings ───

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Pane splitting (intuitive keys, open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (vim-style, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# Copy mode
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Session management
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind K confirm-before -p "Kill session #S? (y/n)" kill-session

# ─── Status bar ───

set -g status-position bottom
set -g status-style "bg=default,fg=default"
set -g status-left-length 50
set -g status-right-length 50
set -g status-left "#[fg=blue,bold]#S #[fg=default,nobold]| "
set -g status-right " %Y-%m-%d %H:%M "

# Window status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=blue,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=blue"

# Message style
set -g message-style "bg=default,fg=yellow"

# ─── Plugins (via tpm) ───

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'

# Auto-restore sessions
set -g @continuum-restore 'on'

# Initialize tpm (must be the last line)
run '~/.tmux/plugins/tpm/tpm'
